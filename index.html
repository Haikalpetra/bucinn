<title>Petra ❤️ Ziaa</title>
<style>
body{margin:0;font-family:Segoe UI;background:linear-gradient(135deg,#ff8fc7,#ffd8ee);overflow-x:hidden;color:white}
.loading{position:fixed;inset:0;background:#ff6fb0;display:flex;align-items:center;justify-content:center;z-index:9999;font-size:2rem}
.hide{display:none}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
h1{font-size:4rem}
.card{background:rgba(255,255,255,.15);backdrop-filter:blur(12px);padding:25px;margin:20px;border-radius:25px}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;padding:20px}
.photo{width:100%;height:260px;object-fit:cover;border-radius:20px;transition:.4s}
.photo:hover{transform:scale(1.05)}
#hearts span{position:fixed;top:-50px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}
button{padding:15px 25px;border:none;border-radius:50px;font-size:1rem}

<script>
setTimeout(()=>loading.classList.add('hide'),2500);

const text=`Hai Ziaa... ❤️

Kalau kamu lagi baca ini, berarti ada satu hal yang pengen aku sampaikan.

Mungkin aku nggak selalu pandai merangkai kata-kata secara langsung. Kadang aku lebih sering bercanda, kadang juga suka bikin kamu kesel, ngambek, atau bahkan gemas sendiri. Tapi di balik semua itu, ada satu hal yang nggak pernah berubah.

Aku sayang kamu.

Sesederhana itu.

Aku masih ingat bagaimana semuanya dimulai. Mungkin bagi orang lain itu hanyalah hari biasa. Tapi buat aku, hari itu menjadi salah satu hari yang paling berharga dalam hidupku. Karena tanpa aku sadari, hari itu adalah awal dari cerita yang mempertemukan aku dengan seseorang yang sekarang begitu berarti.

Kamu tahu nggak?

Dari sekian banyak orang yang ada di dunia ini, dari sekian banyak kemungkinan yang bisa terjadi, semesta justru mempertemukan aku dengan kamu.

Dan sampai sekarang, aku masih menganggap itu sebagai salah satu keberuntungan terbesar yang pernah aku miliki.

Terima kasih ya, sayang.

Terima kasih karena sudah hadir.

Terima kasih karena sudah bertahan.

Terima kasih karena sudah mau menerima aku dengan segala kurang dan lebihnya.

Aku sadar aku bukan orang yang sempurna. Aku masih sering salah. Masih sering bikin kamu kesal. Masih sering nggak peka. Masih banyak hal yang harus aku perbaiki.

Tapi percayalah...

Di antara semua kekuranganku, ada satu hal yang selalu aku usahakan dengan sungguh-sungguh.

Yaitu mencintai kamu.

Karena kamu bukan sekadar seseorang yang aku suka.

Kamu sudah menjadi bagian dari hidupku.

Kamu adalah orang yang selalu ingin aku ceritakan ketika hariku menyenangkan.

Kamu adalah orang yang ingin aku cari ketika hariku terasa berat.

Kamu adalah alasan kenapa banyak senyum muncul tanpa sadar.

Dan kamu adalah alasan kenapa aku selalu ingin menjadi versi terbaik dari diriku sendiri.

Kadang aku membayangkan masa depan.

Aku nggak membayangkan tempat yang mewah.

Aku nggak membayangkan kehidupan yang sempurna.

Aku cuma membayangkan ada kamu di sana.

Ada kamu yang masih tertawa bersama aku.

Ada kamu yang masih menggenggam tanganku.

Ada kamu yang masih menjadi rumah untuk semua cerita yang ingin aku bagi.

Karena sejujurnya...

Rumah bukan selalu tentang bangunan.

Rumah adalah seseorang yang membuat kita merasa tenang ketika berada di dekatnya.

Dan bagiku...

Rumah itu adalah kamu.

Kalau suatu hari nanti kita sedang marahan, tolong ingat satu hal.

Aku mungkin bisa kesal.

Aku mungkin bisa diam.

Aku mungkin bisa egois.

Tapi aku nggak pernah berhenti sayang sama kamu.

Karena perasaan ini nggak berubah hanya karena satu masalah.

Aku tetap memilih kamu.

Hari ini.

Besok.

Lusa.

Dan selama aku masih bisa.

Aku nggak tahu bagaimana cerita kita akan berakhir.

Tapi selama aku masih diberi kesempatan untuk berjalan bersamamu, aku akan terus berusaha menjaga hubungan ini sebaik mungkin.

Karena kehilangan kamu adalah salah satu hal yang nggak pernah ingin aku alami.

Jadi izinkan aku mengatakan ini sekali lagi.

Terima kasih sudah menjadi bagian terindah dari hidup Petra.

Terima kasih sudah menjadi alasan banyak kebahagiaan yang aku rasakan.

Dan terima kasih karena sampai hari ini, aku masih bisa menyebut namamu sebagai seseorang yang paling aku sayangi.

Aku sayang kamu, Ziaa. ❤️

Lebih dari yang bisa dijelaskan oleh kata-kata.
Lebih dari yang bisa ditulis oleh sebuah website.
Dan mungkin...
lebih dari yang pernah kamu bayangkan. 💖`;
let i=0;
function type(){
 if(i<text.length){typing.innerHTML+=text.charAt(i);i++;setTimeout(type,35);}
}
type();

const start=new Date("2026-02-25T00:00:00");
function update(){
 const now=new Date();
 let d=Math.floor((now-start)/86400000);
 let h=Math.floor((now-start)/3600000)%24;
 let m=Math.floor((now-start)/60000)%60;
 let s=Math.floor((now-start)/1000)%60;
 counter.innerHTML=`💖 ${d} Hari ${h} Jam ${m} Menit ${s} Detik`;
}
setInterval(update,1000);update();

function salting(){
 alert("Kalau dunia meminta aku memilih lagi dari awal, aku akan tetap memilih jalan yang membuat aku bertemu dengan kamu, Ziaa💖";
}

setInterval(()=>{
 let h=document.createElement('span');
 h.innerHTML='💖';
 h.style.left=Math.random()*100+'vw';
 h.style.fontSize=(20+Math.random()*25)+'px';
 h.style.animationDuration=(4+Math.random()*5)+'s';
 document.getElementById('hearts').appendChild(h);
 setTimeout(()=>h.remove(),9000);
},300);
</script>
